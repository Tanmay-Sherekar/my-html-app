name: CI-CD Pipeline

on:
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Convert repo name to lowercase
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
        shell: bash

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/$REPO/html-app:latest .
          docker tag ghcr.io/$REPO/html-app:latest ghcr.io/$REPO/html-app:${{ github.sha }}

      - name: Push Docker Image
        run: |
          docker push ghcr.io/$REPO/html-app:latest
          docker push ghcr.io/$REPO/html-app:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Convert repo name to lowercase
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
        shell: bash

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0  
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Logging into GHCR..."
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Pulling latest image..."
            docker pull ghcr.io/$REPO/html-app:latest

            echo "Stopping old container..."
            docker stop html-app || true
            docker rm html-app || true

            echo "Starting new container..."
            docker run -d -p 80:80 --restart always --name html-app ghcr.io/$REPO/html-app:latest
